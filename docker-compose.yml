services:
  web:
    image: ghcr.io/sneaks-community/sneaks-community-website:latest
    container_name: sneaks_community_web
    ports:
      - "3000:3000"
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
    security_opt:
      - "apparmor=docker-default"
      - "no-new-privileges=true"
    cap_drop:
      - ALL
    volumes:
      - ./config:/usr/src/app/config:ro
      # Mount user-assets directory for hot-loading custom assets
      # This overlay takes precedence over built-in public/ files
      - ./user-assets:/usr/src/app/user-assets:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "--no-verbose", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
