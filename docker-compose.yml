services:
  web:
    build:
      context: .
      target: production
    container_name: sneaks_community_web
    ports:
      - "3000:3000"
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
    security_opt:
      - "apparmor=docker-default"
      - "no-new-privileges=true"
    cap_drop:
      - ALL
    volumes:
      - ./config:/usr/src/app/config:ro
      - ./public:/usr/src/app/public:ro
    healthcheck:
      test: ["CMD", "wget", "--no-cache", "--spider", "--no-verbose", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
